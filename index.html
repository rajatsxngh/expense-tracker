<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117; color: #c9d1d9; min-height: 100vh;
  }

  /* Fixed Header */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #161b22; border-bottom: 1px solid #30363d;
    padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 20px; font-weight: 600; color: #f0f6fc; }
  .header h1 span { color: #58a6ff; }
  .header .total {
    font-size: 24px; font-weight: 700; color: #f0f6fc;
  }
  .header .total .label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 2px; }

  .container { max-width: 900px; margin: 0 auto; padding: 100px 24px 40px; }

  /* Add Form */
  .form-card {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 24px; margin-bottom: 24px;
  }
  .form-card h2 { font-size: 16px; font-weight: 600; color: #f0f6fc; margin-bottom: 16px; }
  .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
  .form-group label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; }
  .form-group input, .form-group select {
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    padding: 10px 12px; color: #c9d1d9; font-size: 14px; outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: #58a6ff; }
  .form-group input::placeholder { color: #484f58; }
  .form-group select { cursor: pointer; }
  .form-group select option { background: #161b22; }

  .btn {
    background: #238636; border: 1px solid #2ea043; color: #fff;
    padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: 500;
    cursor: pointer; align-self: flex-end; white-space: nowrap;
  }
  .btn:hover { background: #2ea043; }

  /* Table */
  .table-card {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    overflow: hidden;
  }
  .table-header {
    padding: 16px 20px; border-bottom: 1px solid #30363d;
    display: flex; align-items: center; justify-content: space-between;
  }
  .table-header h2 { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  .table-header .count { background: #30363d; color: #8b949e; font-size: 12px; padding: 2px 8px; border-radius: 10px; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th {
    text-align: left; padding: 10px 20px; font-size: 12px;
    text-transform: uppercase; letter-spacing: .5px; color: #8b949e;
    font-weight: 500; border-bottom: 1px solid #30363d;
  }
  td { padding: 12px 20px; border-bottom: 1px solid #21262d; }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: #1c2129; }

  .cat-badge {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 500; background: #30363d; color: #c9d1d9;
  }
  .amount { font-weight: 600; color: #f85149; font-family: 'SF Mono', Consolas, monospace; }
  .date-cell { color: #8b949e; font-size: 13px; }
  .desc-cell { color: #c9d1d9; }

  .delete-btn {
    background: none; border: 1px solid #30363d; color: #f85149;
    padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  .delete-btn:hover { background: #3d1418; border-color: #f85149; }

  .empty { padding: 40px 20px; text-align: center; color: #484f58; font-size: 14px; }

  /* TODO: No responsive mobile layout */
  /* TODO: No search or date range filter */
  /* TODO: No edit functionality for existing expenses */
  /* TODO: No monthly/weekly breakdown or charts */
  /* TODO: No category-wise spending summary */
  /* TODO: No budget limits or alerts */
  /* TODO: No export to CSV */
  /* TODO: No income tracking (only expenses) */
  /* TODO: No recurring expenses */
  /* TODO: No currency selection */
</style>
</head>
<body>

<div class="header">
  <h1>💰 <span>Expense</span> Tracker</h1>
  <div class="total">
    <span class="label">Total Spent</span>
    $<span id="total-amount">0.00</span>
  </div>
</div>

<div class="container">

  <!-- Add Expense Form -->
  <div class="form-card">
    <h2>Add Expense</h2>
    <form id="expense-form" onsubmit="return addExpense(event)">
      <div class="form-row">
        <div class="form-group">
          <label>Amount ($)</label>
          <input type="number" id="inp-amount" min="0.01" step="0.01" placeholder="0.00" required>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="inp-category" required>
            <option value="Food">🍔 Food</option>
            <option value="Transport">🚗 Transport</option>
            <option value="Bills">💡 Bills</option>
            <option value="Entertainment">🎬 Entertainment</option>
            <option value="Shopping">🛍️ Shopping</option>
            <option value="Other">📦 Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="inp-desc" placeholder="What was it for?" required>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="inp-date" required>
        </div>
        <button class="btn" type="submit">Add Expense</button>
      </div>
    </form>
  </div>

  <!-- TODO: Search bar would go here -->
  <!-- TODO: Date range filter would go here -->
  <!-- TODO: Category-wise spending summary would go here -->
  <!-- TODO: Budget progress bars would go here -->

  <!-- Expenses Table -->
  <div class="table-card">
    <div class="table-header">
      <h2>Expenses</h2>
      <span class="count" id="expense-count">0</span>
      <!-- TODO: Export CSV button would go here -->
    </div>
    <div id="table-body"></div>
  </div>

  <!-- TODO: Analytics tab with charts would go here -->
  <!-- TODO: Monthly summary cards would go here -->
  <!-- TODO: Recurring expenses settings would go here -->
  <!-- TODO: Budget settings panel would go here -->

</div>

<script>
const CATEGORIES = {
  Food: '🍔', Transport: '🚗', Bills: '💡',
  Entertainment: '🎬', Shopping: '🛍️', Other: '📦'
};

const STORAGE_KEY = 'expense-tracker-data';

function loadExpenses() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch { return []; }
}

function saveExpenses(expenses) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function formatAmount(n) {
  return parseFloat(n).toFixed(2);
}

function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function render() {
  const expenses = loadExpenses();

  // Sort by date descending
  expenses.sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));

  // Total
  const total = expenses.reduce((sum, e) => sum + parseFloat(e.amount), 0);
  document.getElementById('total-amount').textContent = formatAmount(total);
  document.getElementById('expense-count').textContent = expenses.length;

  const container = document.getElementById('table-body');

  if (expenses.length === 0) {
    container.innerHTML = '<div class="empty">No expenses yet. Add one above!</div>';
    return;
  }

  // TODO: Filter by search query
  // TODO: Filter by date range

  let html = '<table><thead><tr><th>Date</th><th>Category</th><th>Description</th><th style="text-align:right">Amount</th><th></th></tr></thead><tbody>';

  for (const e of expenses) {
    const emoji = CATEGORIES[e.category] || '📦';
    html += '<tr>'
      + '<td class="date-cell">' + esc(formatDate(e.date)) + '</td>'
      + '<td><span class="cat-badge">' + emoji + ' ' + esc(e.category) + '</span></td>'
      + '<td class="desc-cell">' + esc(e.description) + '</td>'
      + '<td class="amount" style="text-align:right">$' + formatAmount(e.amount) + '</td>'
      + '<td><button class="delete-btn" onclick="deleteExpense(\'' + e.id + '\')">Delete</button></td>'
      // TODO: Edit button would go here
      + '</tr>';
  }

  html += '</tbody></table>';
  container.innerHTML = html;
}

function addExpense(event) {
  event.preventDefault();

  const amount = document.getElementById('inp-amount').value;
  const category = document.getElementById('inp-category').value;
  const description = document.getElementById('inp-desc').value.trim();
  const date = document.getElementById('inp-date').value;

  if (!amount || !category || !description || !date) return false;

  const expenses = loadExpenses();
  expenses.push({
    id: generateId(),
    amount: parseFloat(amount),
    category: category,
    description: description,
    date: date,
    // TODO: recurring flag would go here
    // TODO: recurring frequency would go here
  });

  saveExpenses(expenses);
  render();

  // Reset form but keep category and date
  document.getElementById('inp-amount').value = '';
  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-amount').focus();

  return false;
}

function deleteExpense(id) {
  const expenses = loadExpenses().filter(e => e.id !== id);
  saveExpenses(expenses);
  render();
}

// TODO: function editExpense(id) { }
// TODO: function searchExpenses(query) { }
// TODO: function filterByDateRange(from, to) { }
// TODO: function exportCSV() { }
// TODO: function renderAnalytics() { }
// TODO: function renderCategoryChart() { }
// TODO: function renderDailyChart() { }
// TODO: function checkBudgetLimits() { }
// TODO: function generateRecurringExpenses() { }

// Set default date to today
document.getElementById('inp-date').valueAsDate = new Date();

// Initial render
render();
</script>
</body>
</html>
